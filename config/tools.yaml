# salmon -- Redfish-flavoured HTTP facade for legacy
# IPMI BMCs, declared as url2code endpoints.
#
# Every Redfish JSON envelope is built via the
# `output.template` feature url2code 1.1.0 added; the
# four IPMI-touching endpoints shell out to bin/ipmi-*
# shims (each emitting a small JSON blob) and let the
# template wrap that in OData/Redfish boilerplate. The
# remaining endpoints (ServiceRoot, OData document,
# collection envelopes) ship as pure-static templates
# -- their `command.executable` is `/bin/true` because
# url2code still requires a command per endpoint, but
# nothing parsed_output-side flows into the response.
#
# Single-host scope (v0.2.0): salmon represents ONE
# BMC. The Systems and Chassis collections always have
# exactly one member; its id comes from
# template_static.id (default "1"), overridable via the
# YAML at deploy time.

api:
  title:        salmon
  version:      0.3.1
  default_root: /

logging:
  level: INFO

# ------------------------------------------------------------------
# Shared static bag. salmon is a single-host facade, so the system
# id and a few other Redfish boilerplate strings are constant. We
# keep them next to the endpoints rather than scattered through
# every template_static so future operator-level overrides are
# obvious. (When url2code grows YAML-level anchors this would be
# `<<: *common_static`; for now each endpoint repeats `id` because
# pydantic's YAML loader doesn't expand anchors that span values.)
# ------------------------------------------------------------------

endpoints:

  # ============================================================
  # Redfish version document.
  # GET /redfish -> { "v1": "/redfish/v1/" }
  # Pure static. /bin/true is a no-op command; the response IS
  # the template.
  # ============================================================

  - name: redfish-version
    route:  /redfish
    method: GET
    description: >-
      Redfish version document.
    command:
      executable: /bin/true
    output:
      mode: text
      template_content_type: application/json
      template:
        v1: /redfish/v1/

  # ============================================================
  # ServiceRoot.
  # GET /redfish/v1/ -> root Redfish identity.
  # ============================================================

  - name: service-root
    route:  /redfish/v1/
    method: GET
    description: >-
      Redfish ServiceRoot.
    command:
      executable: /bin/true
    output:
      mode: text
      template_content_type: application/json
      template:
        "@odata.id":      /redfish/v1/
        "@odata.type":    "#ServiceRoot.v1_0_0.ServiceRoot"
        Id:               RootService
        Name:             Root Service
        RedfishVersion:   1.0.0
        Systems:
          "@odata.id":    /redfish/v1/Systems
        Chassis:
          "@odata.id":    /redfish/v1/Chassis

  # ============================================================
  # OData service document.
  # GET /redfish/v1/odata -> minimal OData root.
  # ============================================================

  - name: odata-root
    route:  /redfish/v1/odata
    method: GET
    description: >-
      Redfish OData service document.
    command:
      executable: /bin/true
    output:
      mode: text
      template_content_type: application/json
      template:
        "@odata.context": /redfish/v1/$metadata
        value:
          - name: Service
            kind: Singleton
            url:  /redfish/v1/
          - name: Systems
            kind: Singleton
            url:  /redfish/v1/Systems
          - name: Chassis
            kind: Singleton
            url:  /redfish/v1/Chassis

  # ============================================================
  # Systems collection.
  # GET /redfish/v1/Systems -> one member: "/redfish/v1/Systems/1"
  # ============================================================

  - name: systems-collection
    route:  /redfish/v1/Systems
    method: GET
    description: >-
      ComputerSystemCollection. salmon represents one BMC; the
      collection always has exactly one member.
    command:
      executable: /bin/true
    output:
      mode: text
      template_content_type: application/json
      template_static:
        id: "1"
      template:
        "@odata.id":   /redfish/v1/Systems
        "@odata.type": "#ComputerSystemCollection.ComputerSystemCollection"
        Name:          Computer System Collection
        Members@odata.count: 1
        Members:
          - "@odata.id": /redfish/v1/Systems/{static.id}

  # ============================================================
  # ComputerSystem (single member).
  # GET /redfish/v1/Systems/1 -> Id + Name + PowerState + Reset
  # action. PowerState comes from bin/ipmi-power-status (which
  # already TitleCases the value to match Redfish).
  # ============================================================

  - name: computer-system
    route:  /redfish/v1/Systems/1
    method: GET
    description: >-
      ComputerSystem. PowerState reads from ipmitool; the rest
      is static.
    command:
      executable: /app/bin/ipmi-power-status
      timeout_seconds: 10
    output:
      mode: native_json
      template_content_type: application/json
      template_static:
        id:   "1"
        name: system-1
      template:
        "@odata.id":   /redfish/v1/Systems/{static.id}
        "@odata.type": "#ComputerSystem.v1_0_0.ComputerSystem"
        Id:            "{static.id}"
        Name:          "{static.name}"
        PowerState:    "{parsed_output.PowerState}"
        Actions:
          "#ComputerSystem.Reset":
            target: /redfish/v1/Systems/{static.id}/Actions/ComputerSystem.Reset
            "ResetType@Redfish.AllowableValues":
              # YAML 1.1 treats bare On/Off (and Yes/No)
              # as booleans -- quote them so they survive
              # as strings into the response template's
              # ResetType@Redfish.AllowableValues array.
              - "On"
              - ForceOff
              - GracefulShutdown
              - GracefulRestart
              - ForceRestart
              - ForceOn
              - PowerCycle
              - Nmi

  # ============================================================
  # Reset action.
  # POST /redfish/v1/Systems/1/Actions/ComputerSystem.Reset
  # body: { "ResetType": "<one of the AllowableValues>" }
  # ============================================================

  - name: computer-system-reset
    route:  /redfish/v1/Systems/1/Actions/ComputerSystem.Reset
    method: POST
    description: >-
      ComputerSystem.Reset action. Maps the Redfish ResetType
      to the matching `ipmitool chassis power` subcommand
      inside bin/ipmi-reset.
    defaults:
      ResetType: ForceRestart
    command:
      executable: /app/bin/ipmi-reset
      args:
        - "{ResetType}"
      timeout_seconds: 15
    request:
      validations:
        ResetType:
          type: enum
          # See the AllowableValues note above on quoting
          # "On" -- same YAML 1.1 quirk applies here.
          choices:
            - "On"
            - ForceOff
            - GracefulShutdown
            - GracefulRestart
            - ForceRestart
            - ForceOn
            - PowerCycle
            - Nmi
    output:
      mode: native_json
      template_content_type: application/json
      template:
        "@Message.ExtendedInfo":
          - MessageId: Base.1.0.Success
            Message:   "Reset action '{parsed_output.ResetType}' dispatched (ipmitool {parsed_output.action})."

  # ============================================================
  # Chassis collection.
  # ============================================================

  - name: chassis-collection
    route:  /redfish/v1/Chassis
    method: GET
    description: >-
      ChassisCollection. Mirrors the Systems collection -- one
      member, the same id.
    command:
      executable: /bin/true
    output:
      mode: text
      template_content_type: application/json
      template_static:
        id: "1"
      template:
        "@odata.id":   /redfish/v1/Chassis
        "@odata.type": "#ChassisCollection.ChassisCollection"
        Name:          Chassis Collection
        Members@odata.count: 1
        Members:
          - "@odata.id": /redfish/v1/Chassis/{static.id}

  # ============================================================
  # Chassis (single member).
  # ============================================================

  - name: chassis
    route:  /redfish/v1/Chassis/1
    method: GET
    description: >-
      Chassis. Static envelope plus links to its Power and
      Thermal sub-resources.
    command:
      executable: /bin/true
    output:
      mode: text
      template_content_type: application/json
      template_static:
        id:   "1"
        name: chassis-1
      template:
        "@odata.id":      /redfish/v1/Chassis/{static.id}
        "@odata.type":    "#Chassis.v1_0_0.Chassis"
        Id:               "{static.id}"
        Name:             "{static.name}"
        ChassisType:      RackMount
        Power:
          "@odata.id":    /redfish/v1/Chassis/{static.id}/Power
        Thermal:
          "@odata.id":    /redfish/v1/Chassis/{static.id}/Thermal

  # ============================================================
  # Power resource.
  # GET /redfish/v1/Chassis/1/Power -> Voltages + PowerSupplies.
  # ============================================================

  - name: chassis-power
    route:  /redfish/v1/Chassis/1/Power
    method: GET
    description: >-
      Power resource. Voltages + PowerSupplies parsed from
      ipmitool sensor list; PSU detection by name prefix.
    command:
      executable: /app/bin/ipmi-sensors-power
      timeout_seconds: 15
    output:
      mode: native_json
      template_content_type: application/json
      template_static:
        id: "1"
      template:
        "@odata.id":     /redfish/v1/Chassis/{static.id}/Power
        "@odata.type":   "#Power.v1_0_0.Power"
        Id:              Power
        Name:            Power
        Voltages:        "{parsed_output.Voltages}"
        PowerSupplies:   "{parsed_output.PowerSupplies}"

  # ============================================================
  # Thermal resource.
  # GET /redfish/v1/Chassis/1/Thermal -> Temperatures + Fans.
  # ============================================================

  - name: chassis-thermal
    route:  /redfish/v1/Chassis/1/Thermal
    method: GET
    description: >-
      Thermal resource. Temperatures (degrees C readings) and
      Fans (RPM readings) parsed from ipmitool sensor list.
    command:
      executable: /app/bin/ipmi-sensors-thermal
      timeout_seconds: 15
    output:
      mode: native_json
      template_content_type: application/json
      template_static:
        id: "1"
      template:
        "@odata.id":     /redfish/v1/Chassis/{static.id}/Thermal
        "@odata.type":   "#Thermal.v1_0_0.Thermal"
        Id:              Thermal
        Name:            Thermal
        Temperatures:    "{parsed_output.Temperatures}"
        Fans:            "{parsed_output.Fans}"
