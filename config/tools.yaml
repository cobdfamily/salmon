# salmon -- Redfish-flavoured HTTP facade for legacy
# IPMI BMCs, declared as url2code endpoints.
#
# Every Redfish JSON envelope is built via the
# `output.template` feature url2code 1.1.0 added; the
# IPMI-touching endpoints shell out to bin/ipmi-*
# shims (each emitting a small JSON blob) and let the
# template wrap that in OData/Redfish boilerplate. The
# remaining endpoints (ServiceRoot, OData document)
# ship as pure-static templates -- their
# `command.executable` is `/bin/true` because url2code
# still requires a command per endpoint, but nothing
# parsed_output-side flows into the response.
#
# MULTI-HOST scope (v1.0.0): salmon represents N BMCs.
# Each BMC is a member in /app/config/bmcs.yaml, keyed
# by its Redfish `id`. The per-member routes carry that
# id as the `{id}` path segment (url2code 1.7.0 route
# path-params), which url2code threads through to each
# shim as its first argument and exposes in templates as
# `{request.id}`. bin/ipmi-env resolves the id ->
# connection args from bmcs.yaml; bin/ipmi-collection
# builds the Systems/Chassis collection Members lists
# from the same file. REQUIRES url2code >= 1.7.0.

api:
  title:        salmon
  version:      1.0.2
  default_root: /

logging:
  level: INFO

# ------------------------------------------------------------------
# Multi-host: the BMC inventory lives in config/bmcs.yaml, not in
# this file. Per-member endpoints capture the Redfish member id from
# the `{id}` path segment and echo/coerce it via a `text` validation
# so it renders consistently as `{request.id}` in templates and is
# passed as the first arg to the ipmi-* shims. The collection
# endpoints build their Members arrays dynamically from bmcs.yaml
# via bin/ipmi-collection.
# ------------------------------------------------------------------

endpoints:

  # ============================================================
  # Redfish version document.
  # GET /redfish -> { "v1": "/redfish/v1/" }
  # Pure static. /bin/true is a no-op command; the response IS
  # the template.
  # ============================================================

  - name: redfish-version
    route:  /redfish
    method: GET
    description: >-
      Redfish version document.
    command:
      executable: /bin/true
    output:
      mode: text
      template_content_type: application/json
      template:
        v1: /redfish/v1/

  # ============================================================
  # ServiceRoot.
  # GET /redfish/v1/ -> root Redfish identity.
  # ============================================================

  - name: service-root
    route:  /redfish/v1/
    method: GET
    description: >-
      Redfish ServiceRoot.
    command:
      executable: /bin/true
    output:
      mode: text
      template_content_type: application/json
      template:
        "@odata.id":      /redfish/v1/
        "@odata.type":    "#ServiceRoot.v1_0_0.ServiceRoot"
        Id:               RootService
        Name:             Root Service
        RedfishVersion:   1.0.0
        Systems:
          "@odata.id":    /redfish/v1/Systems
        Chassis:
          "@odata.id":    /redfish/v1/Chassis

  # ============================================================
  # OData service document.
  # GET /redfish/v1/odata -> minimal OData root.
  # ============================================================

  - name: odata-root
    route:  /redfish/v1/odata
    method: GET
    description: >-
      Redfish OData service document.
    command:
      executable: /bin/true
    output:
      mode: text
      template_content_type: application/json
      template:
        "@odata.context": /redfish/v1/$metadata
        value:
          - name: Service
            kind: Singleton
            url:  /redfish/v1/
          - name: Systems
            kind: Singleton
            url:  /redfish/v1/Systems
          - name: Chassis
            kind: Singleton
            url:  /redfish/v1/Chassis

  # ============================================================
  # Systems collection.
  # GET /redfish/v1/Systems -> one member per BMC in bmcs.yaml,
  # built dynamically by bin/ipmi-collection.
  # ============================================================

  - name: systems-collection
    route:  /redfish/v1/Systems
    method: GET
    description: >-
      ComputerSystemCollection. One member per BMC in
      config/bmcs.yaml; the Members list + count are produced
      by bin/ipmi-collection.
    command:
      executable: /app/bin/ipmi-collection
      args:
        - /redfish/v1/Systems
      timeout_seconds: 10
    output:
      mode: native_json
      template_content_type: application/json
      template:
        "@odata.id":   /redfish/v1/Systems
        "@odata.type": "#ComputerSystemCollection.ComputerSystemCollection"
        Name:          Computer System Collection
        Members@odata.count: "{parsed_output.count}"
        Members:       "{parsed_output.Members}"

  # ============================================================
  # ComputerSystem (single member).
  # GET /redfish/v1/Systems/{id} -> Id + Name + PowerState +
  # Reset action. PowerState comes from bin/ipmi-power-status
  # (which already TitleCases the value to match Redfish); the
  # {id} path segment selects the BMC from bmcs.yaml.
  # ============================================================

  - name: computer-system
    route:  /redfish/v1/Systems/{id}
    method: GET
    description: >-
      ComputerSystem. PowerState reads from ipmitool for the
      BMC selected by {id}; the rest is static.
    command:
      executable: /app/bin/ipmi-power-status
      args:
        - "{id}"
      timeout_seconds: 10
    request:
      validations:
        id:
          type: text
    output:
      mode: native_json
      template_content_type: application/json
      template:
        "@odata.id":   /redfish/v1/Systems/{request.id}
        "@odata.type": "#ComputerSystem.v1_0_0.ComputerSystem"
        Id:            "{request.id}"
        Name:          "System {request.id}"
        PowerState:    "{parsed_output.PowerState}"
        Actions:
          "#ComputerSystem.Reset":
            target: /redfish/v1/Systems/{request.id}/Actions/ComputerSystem.Reset
            "ResetType@Redfish.AllowableValues":
              # YAML 1.1 treats bare On/Off (and Yes/No)
              # as booleans -- quote them so they survive
              # as strings into the response template's
              # ResetType@Redfish.AllowableValues array.
              - "On"
              - ForceOff
              - GracefulShutdown
              - GracefulRestart
              - ForceRestart
              - ForceOn
              - PowerCycle
              - Nmi

  # ============================================================
  # Reset action.
  # POST /redfish/v1/Systems/{id}/Actions/ComputerSystem.Reset
  # body: { "ResetType": "<one of the AllowableValues>" }
  # ============================================================

  - name: computer-system-reset
    route:  /redfish/v1/Systems/{id}/Actions/ComputerSystem.Reset
    method: POST
    description: >-
      ComputerSystem.Reset action. Maps the Redfish ResetType
      to the matching `ipmitool chassis power` subcommand
      inside bin/ipmi-reset, against the BMC selected by {id}.
    defaults:
      ResetType: ForceRestart
    command:
      executable: /app/bin/ipmi-reset
      args:
        - "{id}"
        - "{ResetType}"
      timeout_seconds: 15
    request:
      validations:
        id:
          type: text
        ResetType:
          type: enum
          # See the AllowableValues note above on quoting
          # "On" -- same YAML 1.1 quirk applies here.
          choices:
            - "On"
            - ForceOff
            - GracefulShutdown
            - GracefulRestart
            - ForceRestart
            - ForceOn
            - PowerCycle
            - Nmi
    output:
      mode: native_json
      template_content_type: application/json
      template:
        "@Message.ExtendedInfo":
          - MessageId: Base.1.0.Success
            Message:   "Reset action '{parsed_output.ResetType}' dispatched (ipmitool {parsed_output.action})."

  # ============================================================
  # Chassis collection.
  # ============================================================

  - name: chassis-collection
    route:  /redfish/v1/Chassis
    method: GET
    description: >-
      ChassisCollection. Mirrors the Systems collection -- one
      member per BMC in config/bmcs.yaml, built by
      bin/ipmi-collection.
    command:
      executable: /app/bin/ipmi-collection
      args:
        - /redfish/v1/Chassis
      timeout_seconds: 10
    output:
      mode: native_json
      template_content_type: application/json
      template:
        "@odata.id":   /redfish/v1/Chassis
        "@odata.type": "#ChassisCollection.ChassisCollection"
        Name:          Chassis Collection
        Members@odata.count: "{parsed_output.count}"
        Members:       "{parsed_output.Members}"

  # ============================================================
  # Chassis (single member).
  # ============================================================

  - name: chassis
    route:  /redfish/v1/Chassis/{id}
    method: GET
    description: >-
      Chassis. Static envelope plus links to its Power and
      Thermal sub-resources; the {id} path segment is echoed
      back as the resource id.
    command:
      executable: /bin/true
    request:
      validations:
        id:
          type: text
    output:
      mode: text
      template_content_type: application/json
      template:
        "@odata.id":      /redfish/v1/Chassis/{request.id}
        "@odata.type":    "#Chassis.v1_0_0.Chassis"
        Id:               "{request.id}"
        Name:             "Chassis {request.id}"
        ChassisType:      RackMount
        Power:
          "@odata.id":    /redfish/v1/Chassis/{request.id}/Power
        Thermal:
          "@odata.id":    /redfish/v1/Chassis/{request.id}/Thermal

  # ============================================================
  # Power resource.
  # GET /redfish/v1/Chassis/{id}/Power -> Voltages + PowerSupplies.
  # ============================================================

  - name: chassis-power
    route:  /redfish/v1/Chassis/{id}/Power
    method: GET
    description: >-
      Power resource. Voltages + PowerSupplies parsed from
      ipmitool sensor list for the BMC selected by {id}; PSU
      detection by name prefix.
    command:
      executable: /app/bin/ipmi-sensors-power
      args:
        - "{id}"
      timeout_seconds: 15
    request:
      validations:
        id:
          type: text
    output:
      mode: native_json
      template_content_type: application/json
      template:
        "@odata.id":     /redfish/v1/Chassis/{request.id}/Power
        "@odata.type":   "#Power.v1_0_0.Power"
        Id:              Power
        Name:            Power
        Voltages:        "{parsed_output.Voltages}"
        PowerSupplies:   "{parsed_output.PowerSupplies}"

  # ============================================================
  # Thermal resource.
  # GET /redfish/v1/Chassis/{id}/Thermal -> Temperatures + Fans.
  # ============================================================

  - name: chassis-thermal
    route:  /redfish/v1/Chassis/{id}/Thermal
    method: GET
    description: >-
      Thermal resource. Temperatures (degrees C readings) and
      Fans (RPM readings) parsed from ipmitool sensor list for
      the BMC selected by {id}.
    command:
      executable: /app/bin/ipmi-sensors-thermal
      args:
        - "{id}"
      timeout_seconds: 15
    request:
      validations:
        id:
          type: text
    output:
      mode: native_json
      template_content_type: application/json
      template:
        "@odata.id":     /redfish/v1/Chassis/{request.id}/Thermal
        "@odata.type":   "#Thermal.v1_0_0.Thermal"
        Id:              Thermal
        Name:            Thermal
        Temperatures:    "{parsed_output.Temperatures}"
        Fans:            "{parsed_output.Fans}"
