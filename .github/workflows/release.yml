name: release

# Builds and pushes the salmon container image to the
# kibble registry on every git tag matching v*. Tagged twice
# — by version (v0.1.0 -> 0.1.0) and as latest. Deploy hosts
# pull from kibble.apps.blindhub.ca/cobdfamily/salmon:<v>.
#
# The kibble registry speaks plain HTTP, so buildkit is
# configured to talk plain HTTP to it. The same config also
# applies to the FROM line in the Dockerfile (which pulls
# cobdfamily/url2code from the same registry).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to rebuild (eg. v0.1.0)"
        required: true

env:
  REGISTRY: kibble.apps.blindhub.ca
  IMAGE: cobdfamily/salmon

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: derive version (strip leading v)
        id: ver
        run: |
          ref="${{ inputs.tag || github.ref_name }}"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"

      - name: set up qemu (for arm64 cross-emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: set up buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."kibble.apps.blindhub.ca"]
              http = true
              insecure = true

      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Multi-arch matches the fleet; apple-silicon dev
          # boxes pull native arm64.
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Attach a CycloneDX 1.6 SBOM alongside the image in
      # kibble via the OCI 1.1 referrers API (`oras attach`).
      # Mirrors trunk v5.11+'s release flow + dispatch +
      # brian; see state-of-the-stack-2026-05-20 Part X
      # step 2 for the rationale.
      - name: install uv (for SBOM generation)
        uses: astral-sh/setup-uv@v6
        with:
          version: latest
          enable-cache: true
      - name: sync dependencies
        run: uv sync --frozen
      - name: generate CycloneDX SBOM
        run: |
          uv tool install cyclonedx-bom
          cyclonedx-py environment .venv/bin/python \
            --pyproject pyproject.toml \
            --output-reproducible \
            --output-file bom.cdx.json
      - name: install oras
        uses: oras-project/setup-oras@v1
      - name: attach SBOM as OCI 1.1 referrer
        run: |
          oras attach \
            --artifact-type application/vnd.cyclonedx+json \
            --plain-http \
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.ver.outputs.version }} \
            bom.cdx.json:application/vnd.cyclonedx+json

      - name: summary
        run: |
          {
            echo "### Pushed"
            echo ""
            echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.ver.outputs.version }}\`"
            echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE }}:latest\`"
            echo ""
            echo "### SBOM attached"
            echo ""
            echo "- artifact-type \`application/vnd.cyclonedx+json\`"
            echo "- discover via:"
            echo "  \`oras discover --plain-http ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.ver.outputs.version }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
