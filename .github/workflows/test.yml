name: test

# salmon has no Python source -- the HTTP surface is
# entirely defined in config/tools.yaml. CI runs:
#
#   - tests/test_config.py: structural checks on the
#     YAML so a careless edit can't ship a malformed
#     config that only surfaces at container start.
#   - tests/test_e2e.py: brings up the locally-built
#     test image (Dockerfile.test = salmon + mocked
#     ipmitool) and walks the whole Redfish surface
#     via the canned responses.
#
# No real BMC required -- the mock replaces
# /usr/bin/ipmitool with a shell script that emits
# canned chassis-power / sensor-list output. Identical
# JSON shapes to a live BMC; runs anywhere docker runs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Nightly catches a url2code:latest base-image
  # regression -- without waiting for the next push.
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch:

jobs:
  yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: python3 -m pip install -r tests/requirements.txt
      - run: python3 -m pytest tests/test_config.py -v

  e2e:
    runs-on: ubuntu-latest
    needs: [yaml]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: configure docker for plain-HTTP kibble registry
        # salmon's Dockerfile pulls cobdfamily/url2code
        # from kibble. The kibble registry speaks plain
        # HTTP; the runner's docker daemon defaults to
        # HTTPS-only, so flag kibble as insecure before
        # any pull.
        run: |
          sudo mkdir -p /etc/docker
          echo '{"insecure-registries":["kibble.apps.blindhub.ca"]}' \
            | sudo tee /etc/docker/daemon.json >/dev/null
          sudo systemctl restart docker
          for i in $(seq 1 30); do
            docker info >/dev/null 2>&1 && break
            sleep 1
          done

      - name: set up buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."kibble.apps.blindhub.ca"]
              http = true
              insecure = true

      - name: build base image (loaded into local docker)
        # The "real" salmon image, tagged so
        # Dockerfile.test's FROM can pull it locally
        # rather than reaching out to kibble for a
        # not-yet-published tag.
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          platforms: linux/amd64
          tags: kibble.apps.blindhub.ca/cobdfamily/salmon:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: build test image
        # Test image extends the base, swaps in the
        # mocked ipmitool. Tagged `salmon:test` to
        # match docker-compose.test.yaml.
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.test
          push: false
          load: true
          platforms: linux/amd64
          tags: salmon:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: bring up stack
        run: docker compose -f docker-compose.test.yaml up -d

      - name: wait for liveness
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/ >/dev/null 2>&1; then
              echo "salmon up"
              exit 0
            fi
            sleep 1
          done
          echo "salmon failed to come up" >&2
          docker compose -f docker-compose.test.yaml logs
          exit 1

      - name: install python test deps
        run: |
          python3 -m pip install -r tests/requirements.txt

      - name: run e2e tests
        run: python3 -m pytest tests/test_e2e.py -v

      - name: dump container logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yaml logs

      - name: tear down
        if: always()
        run: docker compose -f docker-compose.test.yaml down -v
