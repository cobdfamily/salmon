# Local-dev / production-shape compose for salmon.
#
# salmon is MULTI-HOST as of 1.0.0: the BMCs it fronts and
# their credentials live in config/bmcs.yaml, NOT in
# environment variables. The image bakes in a single in-band
# example member (id "1", interface: open) so it works against
# the host's /dev/ipmi0 out of the box.
#
# For a real deployment, write your own bmcs.yaml (one entry
# per BMC -- see the format documented in the baked-in
# config/bmcs.yaml) and mount it READ-ONLY over the baked-in
# default. Uncomment the `volumes:` block below and point it at
# your file (sourced from your secret store -- the passwords
# live in this file). Mirrors how brl mounts its tables.yaml.
#
# In-band mode (a member with no `host`, interface: open) talks
# to /dev/ipmi0 on the host: the host kernel needs the
# ``ipmi_devintf`` module loaded and the device passed through
# via ``devices`` below. Remote members (with a `host`) need no
# device passthrough; credentials come from the file.
#
# Override SALMON_TAG to pin a specific version.

services:
  salmon:
    image: kibble.apps.blindhub.ca/cobdfamily/salmon:${SALMON_TAG:-latest}
    container_name: salmon
    ports:
      - "${SALMON_HTTP_PORT:-8000}:8000"
    # Multi-host creds come from the mounted bmcs.yaml, not env
    # vars. Uncomment to mount your real inventory read-only over
    # the baked-in single-member example:
    # volumes:
    #   - ./bmcs.yaml:/app/config/bmcs.yaml:ro
    # In-band mode: pass the host's BMC device through. Needed
    # only if any bmcs.yaml member is in-band (no host). Comment
    # this block out for an all-remote inventory.
    devices:
      - /dev/ipmi0:/dev/ipmi0
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/', timeout=2).status==200 else 1)"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped
