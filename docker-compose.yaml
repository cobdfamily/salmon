# Local-dev / production-shape compose for salmon.
#
# Defaults to in-band mode: ipmitool talks to
# /dev/ipmi0 on the host. The host kernel needs the
# ``ipmi_devintf`` module loaded; the container
# needs the device passed through via ``devices``.
#
# For remote-BMC mode, comment out the device
# passthrough and set SALMON_BMC_HOST /
# SALMON_BMC_USER / SALMON_BMC_PASSWORD. salmon's
# bin/ipmi-env helper picks up the env vars and
# adds the right ipmitool -I lanplus -H -U -P
# flags automatically.
#
# Override SALMON_TAG to pin a specific version.

services:
  salmon:
    image: kibble.apps.blindhub.ca/cobdfamily/salmon:${SALMON_TAG:-latest}
    container_name: salmon
    ports:
      - "${SALMON_HTTP_PORT:-8000}:8000"
    environment:
      SALMON_BMC_HOST:      ${SALMON_BMC_HOST:-}
      SALMON_BMC_USER:      ${SALMON_BMC_USER:-}
      SALMON_BMC_PASSWORD:  ${SALMON_BMC_PASSWORD:-}
      SALMON_BMC_INTERFACE: ${SALMON_BMC_INTERFACE:-}
    # In-band mode: pass the host's BMC device
    # through. Comment this block out for remote
    # deployments.
    devices:
      - /dev/ipmi0:/dev/ipmi0
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/', timeout=2).status==200 else 1)"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped
